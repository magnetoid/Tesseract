name: torsor

x-postgres-env: &postgres-env
  POSTGRES_DB: ${POSTGRES_DB:-torsor_dev}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

x-app-env: &app-env
  NODE_ENV: ${NODE_ENV:-development}
  APP_ENV: ${APP_ENV:-development}
  API_PORT: ${API_PORT:-3001}
  FRONTEND_PORT: ${FRONTEND_PORT:-3000}
  APP_URL: ${APP_URL:-http://localhost:3000}
  DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-torsor_dev}
  REDIS_URL: redis://redis:6379
  JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  SUPABASE_URL: ${SUPABASE_URL:-}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}

services:
  postgres:
    image: postgres:16-alpine
    container_name: torsor_postgres
    restart: unless-stopped
    environment:
      <<: *postgres-env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-torsor_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - torsor_network

  redis:
    image: redis:7-alpine
    container_name: torsor_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - torsor_network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: torsor_api
    restart: unless-stopped
    env_file:
      - .env.development
    environment:
      <<: *app-env
      PORT: ${API_PORT:-3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    command: npm run dev
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    volumes:
      - ./apps/api:/app
      - api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - torsor_network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3001) + '/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    container_name: torsor_worker
    restart: unless-stopped
    env_file:
      - .env.development
    environment:
      <<: *app-env
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-5000}
    command: npm run dev
    volumes:
      - ./apps/worker:/app
      - worker_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - torsor_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: torsor_frontend
    restart: unless-stopped
    env_file:
      - .env.development
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_ENV: ${APP_ENV:-development}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    command: npm run dev -- --host 0.0.0.0 --port ${FRONTEND_PORT:-3000}
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy
    networks:
      - torsor_network

  adminer:
    image: adminer:4-standalone
    container_name: torsor_adminer
    restart: unless-stopped
    profiles:
      - tools
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - torsor_network

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  api_node_modules:
  worker_node_modules:

networks:
  torsor_network:
    driver: bridge

name: torsor

# Shared-server / Coolify-safe defaults:
# - internal services use `expose` instead of host `ports`
# - no fixed `container_name` values, so deploys stay namespace-safe
# - for local host-port access, use `docker-compose.override.yml` (see README_FULLSTACK.md)

x-postgres-env: &postgres-env
  POSTGRES_DB: ${POSTGRES_DB:-torsor_dev}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

x-app-env: &app-env
  NODE_ENV: ${NODE_ENV:-production}
  APP_ENV: ${APP_ENV:-production}
  API_PORT: ${API_PORT:-3001}
  FRONTEND_PORT: ${FRONTEND_PORT:-3000}
  APP_URL: ${APP_URL:-http://localhost:3000}
  DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-torsor_dev}
  REDIS_URL: redis://redis:6379
  JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  SUPABASE_URL: ${SUPABASE_URL:-}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      <<: *postgres-env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - torsor_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - torsor_network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      <<: *app-env
      PORT: ${API_PORT:-3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    expose:
      - "${API_PORT:-3001}"
    depends_on:
      - postgres
      - redis
    networks:
      - torsor_network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3001) + '/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      <<: *app-env
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-5000}
    depends_on:
      - postgres
      - redis
    networks:
      - torsor_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_ENV: ${APP_ENV:-production}
      VITE_API_URL: ${VITE_API_URL:-/api}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    expose:
      - "80"
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-18080}:80"
    depends_on:
      - api
    networks:
      - torsor_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4-standalone
    restart: unless-stopped
    profiles:
      - tools
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - torsor_network

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  api_node_modules:
  worker_node_modules:

networks:
  torsor_network:
    driver: bridge
